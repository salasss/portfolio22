[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Pas de redirect SPA : le site est mono-page (ancres + hash), donc 404.html
# sert naturellement pour les chemins inconnus.

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
